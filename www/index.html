<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d0d0d">
<title>Soft Sounds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=settings,close,add,stop,pause,timer,check_circle,lock,restore" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<canvas id="ambient" class="ambient-canvas"></canvas>
<div class="app">
  <header>
    <h1>Soft Sounds</h1>
    <p class="sub">White noise for sleep &amp; focus</p>
    <button class="settings-btn" id="settingsBtn" aria-label="Settings">
      <span class="material-symbols-outlined">settings</span>
    </button>
  </header>

  <div class="now-playing" id="nowPlaying">
    <div class="np-text">
      <span id="npLabel">Nothing playing</span>
      <div class="np-dots" id="npDots"></div>
    </div>
    <button class="stop-all" id="stopAll">Stop All</button>
  </div>

  <div class="timer-bar" id="timerBar">
    <div class="timer-display" id="timerDisplay"></div>
    <div class="timer-progress-wrap"><div class="timer-progress" id="timerProgress"></div></div>
  </div>

  <div class="sound-grid" id="soundGrid"></div>

  <div class="upgrade-banner" id="upgradeBanner">
    <div>
      <strong>Soft Sounds Pro</strong>
      <p>Unlock all 12 sounds, unlimited mixing &amp; custom timer</p>
    </div>
    <button class="upgrade-btn" id="upgradeBtn">$3.99</button>
  </div>
</div>

<!-- Sleep Timer Modal -->
<div class="modal" id="timerModal">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <button class="close-btn" id="closeTimer"><span class="material-symbols-outlined">close</span></button>
    <h2>Sleep Timer</h2>
    <div class="timer-presets">
      <button data-min="15">15 min</button>
      <button data-min="30">30 min</button>
      <button data-min="60">60 min</button>
      <button data-min="90">90 min</button>
    </div>
    <div class="custom-timer" id="customTimerWrap">
      <label>Custom (minutes)</label>
      <input type="number" id="customMin" min="1" max="480" value="30" enterkeyhint="done">
    </div>
    <button class="btn-primary" id="startTimer">Start Timer</button>
    <button class="btn-secondary" id="cancelTimer">Cancel</button>
  </div>
</div>

<!-- Settings Modal -->
<div class="modal" id="settingsModal">
  <div class="modal-backdrop"></div>
  <div class="modal-content">
    <button class="close-btn" id="closeSettings"><span class="material-symbols-outlined">close</span></button>
    <h2>Settings</h2>
    <div class="setting-row" id="timerRow">
      <span>Sleep Timer</span>
      <button class="text-btn" id="setTimerBtn">Set</button>
    </div>
    <div class="setting-row">
      <span>Fade out</span>
      <label class="toggle"><input type="checkbox" id="fadeToggle" checked><span class="toggle-slider"></span></label>
    </div>
    <div class="setting-row" id="premiumStatus">
      <span>Premium</span>
      <span class="badge" id="premiumBadge">Free</span>
    </div>
    <div class="setting-row" id="restoreRow">
      <button class="text-btn" id="restoreBtn">Restore purchases</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
